# Existing docker-compose.yml — this is what `type: compose` imports.
# Berth attaches each service here to berth-net automatically.

services:
  db:
    image: postgres:16-alpine
    container_name: legacyapp-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: legacyapp
    volumes:
      - legacyapp-db-data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: legacyapp-cache

volumes:
  legacyapp-db-data:
